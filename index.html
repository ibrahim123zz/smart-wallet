<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محفظتي الذكية</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="wallet-container">
        <h1>محفظتي الرقمية 💰</h1>
        
        <div class="balance-section">
            <h3>الرصيد الحالي:</h3>
            <div id="balance">0</div> ج.م
        </div>

        <div class="control-buttons">
            <input type="number" id="amount-input" placeholder="أدخل المبلغ هنا">
            <div class="buttons-row">
                <button id="btn-income" class="btn-in">دخل (إيداع) 🟢</button>
                <button id="btn-expense" class="btn-out">مصروف (صرف) 🔴</button>
            </div>
        </div>

        <div class="history-section">
            <h3>سجل العمليات (History)📜</h3>
            <ul id="history-list">
                </ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
